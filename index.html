<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABU Care Services</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f7f8fa;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: #ffffff;
      border-radius: 20px;
      padding: 56px 32px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: #0f766e;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 16px;
      color: #111827;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      max-width: 540px;
      margin: 0 auto;
      color: #4b5563;
    }

    @media (max-width: 640px) {
      .card {
        padding: 40px 24px;
      }

      h1 {
        font-size: 28px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">ABU</div>
    <h1>ABU Care Services</h1>
    <p>
      Professional aged care services delivered with compassion, dignity, and respect.
    </p>
  </main>
</body>
</html>
